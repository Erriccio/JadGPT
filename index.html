<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>

    <title>JadGPT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f7f7f8;
            color: #000;
            height: 100dvh;
            overflow: hidden;
        }
        #topbar {
            height: 55px;
            background: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0 20px;
            font-size: 22px;
            font-weight: bold;
            color: #4D6CFF;
        }
        #container {
            height: calc(100dvh - 55px);
            display: flex;
            flex-direction: column;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg-container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .msg-row {
            display: flex;
        }
        .msg {
            padding: 12px 15px;
            border-radius: 12px;
            max-width: 75%;
            font-size: 16px;
            line-height: 1.6;
        }
        .user .msg-row { justify-content: flex-end; }
        .user .msg { background: #d9e8ff; }
        .bot .msg-row { justify-content: flex-start; }
        .bot .msg { background: #e9e9eb; }
        .bot .msg p { margin: 0 0 8px; }
        .bot .msg p:last-child { margin-bottom: 0; }
        .bot .msg ul, .bot .msg ol {
            margin: 6px 0;
            padding-left: 20px;
        }
        .bot .msg li { margin-bottom: 4px; }
        .bot .msg strong { font-weight: bold; }
        .bot .msg em { font-style: italic; }
        .bot .msg code {
            background: #d9e8ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }
        .bot .msg pre {
            background: #d9e8ff;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 14px;
        }
        .bot .msg pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .copy-btn {
            margin-top: 5px;
            margin-left: 4px;
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            font-size: 13px;
            padding: 2px 6px;
            border-radius: 6px;
            align-self: flex-start;
            transition: color 0.2s;
        }
        .copy-btn:hover { color: #4D6CFF; }
        #welcome {
            text-align: center;
            margin-top: 200px;
        }
        #welcome h1 {
            font-size: 42px;
            color: #4D6CFF;
        }
        #input-area {
            padding: 15px;
            background: #fff;
            display: flex;
            gap: 10px;
            border-top: 1px solid #e5e5e5;
        }
        #domanda {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #777;
            font-size: 16px;
        }
        #sendBtn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #4D6CFF;
            color: white;
            cursor: pointer;
            font-size: 18px;
        }
        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #555;
            margin-right: 4px;
            border-radius: 50%;
            animation: bounce 0.6s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        #typing .msg {
            background: transparent !important;
            padding: 5px 0 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <div id="topbar">
    JadGPT
    <a href="https://forms.gle/5jTRZ7rSTChD8XBB8" target="_blank" style="margin-left: auto; font-size: 13px; color: #4D6CFF; text-decoration: none; border: 1px solid #4D6CFF; padding: 6px 12px; border-radius: 20px;">Suggerimenti</a>
</div>

<div id="container">
    <div id="chat">
        <div id="welcome">
            <h1>JadGPT</h1>
            <p>Scrivi un messaggio per iniziare.</p>
        </div>
    </div>
    <div id="input-area">
        <input id="domanda" type="text" placeholder="Scrivi un messaggio...">
        <button id="sendBtn">➤</button>
    </div>
    <div style="text-align:center; padding: 6px; font-size: 11px; color: #aaa; background: #fff;">
        <a href="https://jadgpt.onrender.com/legal.html" style="color: #aaa; text-decoration: none;">Privacy Policy</a> · 
        <a href="https://jadgpt.onrender.com/legal.html" style="color: #aaa; text-decoration: none;">Cookie Policy</a> · 
        <a href="https://jadgpt.onrender.com/legal.html" style="color: #aaa; text-decoration: none;">Termini di Utilizzo</a>
    </div>
</div>

<script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("domanda");
    const sendBtn = document.getElementById("sendBtn");

    let chatHistory = [];

    function aggiungiMessaggio(testo, tipo) {
        const wrap = document.createElement("div");
        wrap.className = "msg-container " + tipo;

        const row = document.createElement("div");
        row.className = "msg-row";

        const msg = document.createElement("div");
        msg.className = "msg";

        if (tipo === "bot") {
            msg.innerHTML = marked.parse(testo);
        } else {
            msg.textContent = testo;
        }

        row.appendChild(msg);
        wrap.appendChild(row);

        // Pulsante copia solo per i messaggi del bot
        if (tipo === "bot") {
            const copyBtn = document.createElement("button");
            copyBtn.className = "copy-btn";
            copyBtn.textContent = "📋 Copia";
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(testo).then(() => {
                    copyBtn.textContent = "✅ Copiato!";
                    setTimeout(() => { copyBtn.textContent = "📋 Copia"; }, 2000);
                });
            };
            wrap.appendChild(copyBtn);
        }

        const welcome = document.getElementById("welcome");
        if (welcome) welcome.remove();
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
    }

    function mostraTyping() {
        const wrap = document.createElement("div");
        wrap.className = "msg-container bot";
        wrap.id = "typing";
        wrap.innerHTML = `
            <div class="msg-row">
                <div class="msg">
                    <div class="typing">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>`;
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
    }

    function nascondiTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    async function rispondi() {
        const domanda = input.value.trim();
        if (domanda === "") return;

        aggiungiMessaggio(domanda, "user");
        input.value = "";
        mostraTyping();

        try {
            const res = await fetch("https://jadgpt.onrender.com/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: domanda,
                    history: chatHistory
                })
            });
            const data = await res.json();
            nascondiTyping();
            aggiungiMessaggio(data.response, "bot");

            chatHistory.push({ role: "USER", message: domanda });
            chatHistory.push({ role: "CHATBOT", message: data.response });

        } catch {
            nascondiTyping();
            aggiungiMessaggio("Ops, qui c'è qualcosa che non va", "bot");
        }
    }

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            rispondi();
        }
    });

    sendBtn.addEventListener("click", rispondi);
</script>

</body>
</html>
