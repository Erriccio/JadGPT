<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>JadGPT</title>
    <script type="text/javascript">

        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

    <link rel="manifest" href="/manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --bg: #fafafa;
            --surface: #ffffff;
            --surface2: #f1f5f9;
            --text: #0f172a;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --user-bubble: linear-gradient(135deg, #6366f1, #8b5cf6);
            --bot-bubble: #f1f5f9;
            --radius: 18px;
            --sidebar-width: 260px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column;
            max-width: 100vw;
        }

        /* AUTH */
        #auth-screen {
            display: flex; align-items: center; justify-content: center;
            height: 100dvh; background: linear-gradient(135deg, #f0f4ff, #fdf4ff);
            padding: 20px;
        }
        .auth-box {
            background: white; border-radius: 24px; padding: 40px;
            width: 100%; max-width: 400px;
            box-shadow: 0 8px 40px rgba(99,102,241,0.15);
        }
        .auth-logo { text-align: center; margin-bottom: 28px; }
        .auth-logo .orb {
            width: 64px; height: 64px; border-radius: 18px;
            background: var(--user-bubble);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 800; color: white;
            box-shadow: 0 8px 24px rgba(99,102,241,0.3); margin-bottom: 12px;
        }
        .auth-logo h1 {
            font-size: 26px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #f43f5e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .auth-tabs {
            display: flex; background: var(--surface2);
            border-radius: 12px; padding: 4px; margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1; padding: 8px; border-radius: 9px; border: none;
            background: transparent; font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px; font-weight: 600; cursor: pointer;
            color: var(--text-muted); transition: all 0.2s;
        }
        .auth-tab.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .auth-field { margin-bottom: 14px; }
        .auth-field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .auth-field input {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            border: 1.5px solid var(--border); font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        .auth-field input:focus { border-color: var(--primary-light); }
        .auth-btn {
            width: 100%; padding: 13px; border-radius: 12px; border: none;
            background: var(--user-bubble); color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px;
            transition: all 0.2s; box-shadow: 0 4px 14px rgba(99,102,241,0.3);
        }
        .auth-btn:hover { transform: translateY(-1px); }
        .auth-guest { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
        .auth-guest a { color: var(--primary); cursor: pointer; font-weight: 600; text-decoration: none; }
        .auth-error { background: #fef2f2; color: #ef4444; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
        .auth-info { background: #f0f9ff; color: #0284c7; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: none; }

        /* APP */
        #app-screen { display: none; flex: 1; flex-direction: column; overflow: hidden; max-width: 100vw; }
        #app-screen.visible { display: flex; }

        /* TOPBAR */
        #topbar {
            height: 60px; background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 16px; gap: 8px;
            flex-shrink: 0; box-shadow: 0 1px 12px rgba(99,102,241,0.06);
            overflow: hidden;
        }
        .logo-icon {
            width: 34px; height: 34px; background: var(--user-bubble);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800; color: white; flex-shrink: 0;
        }
        .logo-text {
            font-size: 20px; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), #f43f5e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            flex-shrink: 0;
        }
        .topbar-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .btn-topbar-desktop {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 13px; font-weight: 600; color: var(--primary);
            text-decoration: none; border: 1.5px solid var(--primary-light);
            padding: 6px 14px; border-radius: 20px;
            background: rgba(99,102,241,0.05); transition: all 0.2s; cursor: pointer;
            white-space: nowrap;
        }
        .btn-topbar-desktop:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-topbar-desktop.logout { color: #ef4444; border-color: #fca5a5; background: #fef2f2; }
        .btn-topbar-desktop.logout:hover { background: #ef4444; color: white; border-color: #ef4444; }
        .btn-circle {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1.5px solid var(--border); background: var(--surface);
            cursor: pointer; display: none; align-items: center; justify-content: center;
            font-size: 17px; transition: all 0.2s; flex-shrink: 0;
            text-decoration: none;
        }
        .btn-circle:hover { background: var(--surface2); }
        .btn-circle.logout-circle { border-color: #fca5a5; background: #fef2f2; }
        .btn-circle.sidebar-circle { border-color: var(--primary-light); background: rgba(99,102,241,0.05); }
        .btn-sidebar-toggle {
            width: 36px; height: 36px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--surface);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: all 0.2s; color: var(--text-muted); flex-shrink: 0;
        }
        .btn-sidebar-toggle:hover { background: var(--surface2); color: var(--primary); }

        @media (max-width: 600px) {
            .btn-topbar-desktop { display: none; }
            .btn-circle { display: flex; }
            .btn-sidebar-toggle { display: none; }
        }
        @media (min-width: 601px) { .btn-circle { display: none; } }

        /* MAIN */
        #main { display: flex; flex: 1; overflow: hidden; max-width: 100vw; }

        /* SIDEBAR DESKTOP */
        #sidebar {
            width: var(--sidebar-width); background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
            overflow: hidden; transition: width 0.25s ease, opacity 0.25s ease;
        }
        #sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }

        /* SIDEBAR MOBILE */
        #sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 100;
        }
        #sidebar-overlay.visible { display: block; }
        #sidebar-mobile {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-radius: 20px 20px 0 0;
            z-index: 101; padding: 16px;
            max-height: 70dvh; display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.3s ease;
        }
        #sidebar-mobile.visible { transform: translateY(0); }
        .mobile-drawer-handle {
            width: 40px; height: 4px; background: var(--border);
            border-radius: 2px; margin: 0 auto 16px;
        }
        .mobile-new-chat-btn {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1.5px dashed var(--primary-light);
            background: rgba(99,102,241,0.04); color: var(--primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 12px;
        }
        #mobile-chat-list { flex: 1; overflow-y: auto; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
        .new-chat-btn {
            width: 100%; padding: 10px; border-radius: 12px;
            border: 1.5px dashed var(--primary-light);
            background: rgba(99,102,241,0.04); color: var(--primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .new-chat-btn:hover { background: rgba(99,102,241,0.1); }
        #chat-list { flex: 1; overflow-y: auto; padding: 8px; }
        #chat-list::-webkit-scrollbar { width: 4px; }
        #chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .chat-item {
            padding: 10px 12px; border-radius: 10px; cursor: pointer;
            font-size: 13px; font-weight: 500; color: var(--text);
            display: flex; align-items: center; justify-content: space-between;
            gap: 8px; transition: background 0.15s; margin-bottom: 2px;
        }
        .chat-item:hover { background: var(--surface2); }
        .chat-item.active { background: rgba(99,102,241,0.08); color: var(--primary); font-weight: 600; }
        .chat-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-delete { opacity: 0; font-size: 14px; cursor: pointer; padding: 2px 4px; border-radius: 6px; transition: all 0.15s; }
        .chat-item:hover .chat-delete { opacity: 1; }
        .chat-delete:hover { background: #fef2f2; color: #ef4444; }
        .sidebar-empty { padding: 16px; font-size: 13px; color: var(--text-muted); text-align: center; }

        @media (max-width: 600px) { #sidebar { display: none; } }

        /* CHAT AREA */
        #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        #chat { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* WELCOME */
        #welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 30px 16px; text-align: center; gap: 14px; }
        .welcome-orb { width: 72px; height: 72px; border-radius: 22px; background: var(--user-bubble); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; color: white; box-shadow: 0 12px 40px rgba(99,102,241,0.35); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .welcome-title { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--primary), #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .welcome-subtitle { font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 480px; margin-top: 6px; }
        .suggestion-btn { font-family: 'Plus Jakarta Sans', sans-serif; padding: 9px 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; text-align: left; }
        .suggestion-btn:hover { border-color: var(--primary-light); background: rgba(99,102,241,0.05); color: var(--primary); }

        /* MESSAGGI */
        .msg-container { display: flex; flex-direction: column; gap: 4px; animation: msgIn 0.25s ease; max-width: 100%; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; }
        .msg { padding: 12px 15px; border-radius: var(--radius); max-width: min(72%, calc(100vw - 80px)); font-size: 15px; line-height: 1.65; word-break: break-word; }
        .user .msg-row { justify-content: flex-end; }
        .user .msg { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .bot .msg-row { justify-content: flex-start; }
        .bot .msg { background: var(--bot-bubble); color: var(--text); border-bottom-left-radius: 4px; }
        .bot .msg p { margin: 0 0 8px; }
        .bot .msg p:last-child { margin-bottom: 0; }
        .bot .msg ul, .bot .msg ol { margin: 6px 0; padding-left: 20px; }
        .bot .msg li { margin-bottom: 4px; }
        .bot .msg code { background: rgba(99,102,241,0.12); color: var(--primary-dark); padding: 2px 6px; border-radius: 6px; font-family: monospace; font-size: 13px; }
        .bot .msg pre { background: #1e1e2e; color: #cdd6f4; padding: 14px; border-radius: 12px; overflow-x: auto; font-size: 13px; margin: 8px 0; max-width: 100%; }
        .bot .msg pre code { background: transparent; color: inherit; padding: 0; }
        .copy-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; font-family: 'Plus Jakarta Sans', sans-serif; padding: 3px 8px; border-radius: 8px; align-self: flex-start; transition: all 0.2s; margin-left: 2px; }
        .copy-btn:hover { color: var(--primary); background: rgba(99,102,241,0.08); }
        .avatar { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
        .avatar-bot { background: var(--user-bubble); color: white; }

        /* INPUT */
        #input-area { padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
        #domanda { flex: 1; min-width: 0; padding: 12px 16px; border-radius: 16px; border: 1.5px solid var(--border); font-size: 15px; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        #domanda:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); background: white; }
        #domanda::placeholder { color: var(--text-muted); }
        #sendBtn { width: 44px; height: 44px; border-radius: 14px; border: none; background: var(--user-bubble); color: white; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 14px rgba(99,102,241,0.3); flex-shrink: 0; }
        #sendBtn:hover { transform: scale(1.05); }

        /* TYPING */
        .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
        .typing span { display: inline-block; width: 7px; height: 7px; background: var(--primary-light); border-radius: 50%; animation: bounce 0.6s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.15s; }
        .typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* FOOTER */
        #footer { text-align: center; padding: 5px; font-size: 11px; color: var(--text-muted); background: var(--surface); }
        #footer a { color: var(--text-muted); text-decoration: none; }
        #footer a:hover { color: var(--primary); }
    </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
    <div class="auth-box">
        <div class="auth-logo">
            <div class="orb">J</div>
            <h1>JadGPT</h1>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Accedi</button>
            <button class="auth-tab" onclick="switchTab('register')">Registrati</button>
        </div>
        <div class="auth-error" id="auth-error"></div>
        <div class="auth-info" id="auth-info"></div>
        <div class="auth-field"><label>Email</label><input type="email" id="auth-email" placeholder="tua@email.com"></div>
        <div class="auth-field"><label>Password</label><input type="password" id="auth-password" placeholder="••••••••"></div>
        <button class="auth-btn" id="auth-submit" onclick="submitAuth()">Accedi</button>
        <div class="auth-guest">oppure <a onclick="usaGuestMode()">continua senza account</a></div>
    </div>
</div>

<!-- APP -->
<div id="app-screen">
    <div id="topbar">
        <button class="btn-sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <button class="btn-circle sidebar-circle" onclick="apriMobileSidebar()" title="Cronologia">📋</button>
        <div class="logo-icon">J</div>
        <span class="logo-text">JadGPT</span>
        <div class="topbar-actions">
            <a href="https://forms.gle/5jTRZ7rSTChD8XBB8" target="_blank" class="btn-topbar-desktop">💬 Suggerisci</a>
            <span class="btn-topbar-desktop" id="user-name-badge"></span>
            <button class="btn-topbar-desktop logout" onclick="logout()">🚪 Esci</button>
            <a href="https://forms.gle/5jTRZ7rSTChD8XBB8" target="_blank" class="btn-circle" title="Suggerisci">💬</a>
            <button class="btn-circle logout-circle" onclick="logout()" title="Esci">🚪</button>
        </div>
    </div>

    <div id="main">
        <div id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="nuovaChat()">＋ Nuova chat</button>
            </div>
            <div id="chat-list"><div class="sidebar-empty">Nessuna chat ancora.</div></div>
        </div>
        <div id="chat-area">
            <div id="chat"></div>
            <div id="input-area">
                <input id="domanda" type="text" placeholder="Scrivi un messaggio...">
                <button id="sendBtn">➤</button>
            </div>
            <div id="footer">
                <a href="https://jadgpt.onrender.com/legal.html">Privacy Policy</a> ·
                <a href="https://jadgpt.onrender.com/legal.html">Cookie Policy</a> ·
                <a href="https://jadgpt.onrender.com/legal.html">Termini di Utilizzo</a>
            </div>
        </div>
    </div>
</div>

<!-- Mobile sidebar -->
<div id="sidebar-overlay" onclick="chiudiMobileSidebar()"></div>
<div id="sidebar-mobile">
    <div class="mobile-drawer-handle"></div>
    <button class="mobile-new-chat-btn" onclick="nuovaChat(); chiudiMobileSidebar();">＋ Nuova chat</button>
    <div id="mobile-chat-list"><div class="sidebar-empty">Nessuna chat ancora.</div></div>
</div>

<script>
const API = "https://jadgpt.onrender.com";
let currentUser = null, currentToken = null, currentChatId = null;
let chatHistory = [], isFirstMessage = true, authMode = "login", isGuest = false;
let sidebarOpen = true;

// ── AUTH ──────────────────────────────────────────────────────
function switchTab(mode) {
    authMode = mode;
    document.querySelectorAll(".auth-tab").forEach((t, i) => {
        t.classList.toggle("active", (mode === "login" && i === 0) || (mode === "register" && i === 1));
    });
    document.getElementById("auth-submit").textContent = mode === "login" ? "Accedi" : "Registrati";
    document.getElementById("auth-error").style.display = "none";
    document.getElementById("auth-info").style.display = "none";
}

async function submitAuth() {
    const email = document.getElementById("auth-email").value.trim();
    const password = document.getElementById("auth-password").value;
    const errEl = document.getElementById("auth-error");
    const infoEl = document.getElementById("auth-info");
    errEl.style.display = "none"; infoEl.style.display = "none";
    if (!email || !password) { errEl.textContent = "Inserisci email e password."; errEl.style.display = "block"; return; }
    if (authMode === "register") { infoEl.textContent = "📧 Controlla la tua email per confermare l'account prima di accedere."; infoEl.style.display = "block"; }
    const endpoint = authMode === "login" ? "/auth/login" : "/auth/register";
    try {
        const res = await fetch(API + endpoint, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if (data.success) {
            if (authMode === "register") return;
            currentUser = data.user;
            currentToken = data.access_token;
            isGuest = false;
            // Salva sessione
            localStorage.setItem("jadgpt_token", data.access_token);
            localStorage.setItem("jadgpt_user", data.user);
            localStorage.setItem("jadgpt_email", email);
            avviaApp(email);
        } else { errEl.textContent = data.error || "Errore. Riprova."; errEl.style.display = "block"; }
    } catch { errEl.textContent = "Errore di connessione."; errEl.style.display = "block"; }
}

function usaGuestMode() {
    isGuest = true; currentUser = null; currentToken = null;
    localStorage.removeItem("jadgpt_token");
    localStorage.removeItem("jadgpt_user");
    localStorage.removeItem("jadgpt_email");
    avviaApp(null);
}

function avviaApp(email) {
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app-screen").classList.add("visible");
    const nome = isGuest ? "Ospite" : (email ? email.split("@")[0] : "Utente");
    const badge = document.getElementById("user-name-badge");
    if (badge) badge.textContent = "👤 " + nome;
    if (isGuest) {
        document.getElementById("sidebar").classList.add("collapsed");
        sidebarOpen = false;
    } else {
        caricaChatList();
        nuovaChat();
    }
    mostraWelcome();
}

function logout() {
    localStorage.removeItem("jadgpt_token");
    localStorage.removeItem("jadgpt_user");
    localStorage.removeItem("jadgpt_email");
    currentUser = null; currentToken = null; currentChatId = null;
    chatHistory = []; isGuest = false; sidebarOpen = true;
    document.getElementById("app-screen").classList.remove("visible");
    document.getElementById("auth-screen").style.display = "flex";
    document.getElementById("sidebar").classList.remove("collapsed");
    document.getElementById("auth-email").value = "";
    document.getElementById("auth-password").value = "";
}

// ── SIDEBAR ───────────────────────────────────────────────────
function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    document.getElementById("sidebar").classList.toggle("collapsed", !sidebarOpen);
}
function apriMobileSidebar() {
    document.getElementById("sidebar-overlay").classList.add("visible");
    document.getElementById("sidebar-mobile").classList.add("visible");
}
function chiudiMobileSidebar() {
    document.getElementById("sidebar-overlay").classList.remove("visible");
    document.getElementById("sidebar-mobile").classList.remove("visible");
}

// ── CHAT LIST ─────────────────────────────────────────────────
async function caricaChatList() {
    if (!currentToken) return;
    try {
        const res = await fetch(API + "/chats", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ access_token: currentToken, user_id: currentUser }) });
        const data = await res.json();
        if (data.success) { renderChatList(data.chats, "chat-list"); renderChatList(data.chats, "mobile-chat-list"); }
    } catch {}
}

function renderChatList(chats, containerId) {
    const list = document.getElementById(containerId);
    list.innerHTML = "";
    if (chats.length === 0) { list.innerHTML = '<div class="sidebar-empty">Nessuna chat ancora.</div>'; return; }
    chats.forEach(c => {
        const item = document.createElement("div");
        item.className = "chat-item" + (c.id === currentChatId ? " active" : "");
        item.innerHTML = `<span class="chat-item-title">${c.title}</span><span class="chat-delete" onclick="eliminaChat('${c.id}', event)">🗑️</span>`;
        item.onclick = () => { apriChat(c.id); chiudiMobileSidebar(); };
        list.appendChild(item);
    });
}

async function nuovaChat() {
    if (!currentToken) return;
    chatHistory = []; isFirstMessage = true; mostraWelcome();
    try {
        const res = await fetch(API + "/chats/new", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ access_token: currentToken, user_id: currentUser }) });
        const data = await res.json();
        if (data.success) { currentChatId = data.chat_id; caricaChatList(); }
    } catch {}
}

async function apriChat(chatId) {
    currentChatId = chatId; chatHistory = []; isFirstMessage = false; mostraWelcome();
    try {
        const res = await fetch(API + "/chats/messages", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ access_token: currentToken, chat_id: chatId }) });
        const data = await res.json();
        if (data.success) {
            data.messages.forEach(m => {
                aggiungiMessaggio(m.content, m.role === "user" ? "user" : "bot");
                chatHistory.push({ role: m.role === "user" ? "USER" : "CHATBOT", message: m.content });
            });
        }
    } catch {}
    caricaChatList();
}

async function eliminaChat(chatId, e) {
    e.stopPropagation();
    if (!confirm("Eliminare questa chat?")) return;
    try {
        await fetch(API + "/chats/delete", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ access_token: currentToken, chat_id: chatId }) });
        if (chatId === currentChatId) nuovaChat(); else caricaChatList();
    } catch {}
}

function mostraWelcome() {
    document.getElementById("chat").innerHTML = `
        <div id="welcome">
            <div class="welcome-orb">J</div>
            <div class="welcome-title">Ciao, sono JadGPT</div>
            <div class="welcome-subtitle">La tua AI personale. Chiedimi qualsiasi cosa.</div>
            <div class="suggestions">
                <button class="suggestion-btn" onclick="usaSuggerimento(this)">💡 Cos'è l'intelligenza artificiale?</button>
                <button class="suggestion-btn" onclick="usaSuggerimento(this)">✍️ Scrivimi una poesia</button>
                <button class="suggestion-btn" onclick="usaSuggerimento(this)">🌍 Paesi più grandi del mondo?</button>
                <button class="suggestion-btn" onclick="usaSuggerimento(this)">🍕 Dammi una ricetta italiana</button>
            </div>
        </div>`;
}

// ── MESSAGGI ──────────────────────────────────────────────────
const input = document.getElementById("domanda");
const sendBtn = document.getElementById("sendBtn");

function usaSuggerimento(btn) { input.value = btn.textContent.slice(2).trim(); rispondi(); }

function aggiungiMessaggio(testo, tipo) {
    const chatEl = document.getElementById("chat");
    const wrap = document.createElement("div");
    wrap.className = "msg-container " + tipo;
    const row = document.createElement("div");
    row.className = "msg-row";
    if (tipo === "bot") {
        const avatar = document.createElement("div");
        avatar.className = "avatar avatar-bot"; avatar.textContent = "J";
        row.appendChild(avatar);
    }
    const msg = document.createElement("div");
    msg.className = "msg";
    msg.innerHTML = tipo === "user" ? escapeHTML(testo) : marked.parse(testo);
    row.appendChild(msg); wrap.appendChild(row);
    if (tipo === "bot") {
        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn"; copyBtn.textContent = "📋 Copia risposta";
        copyBtn.onclick = () => { navigator.clipboard.writeText(testo).then(() => { copyBtn.textContent = "✅ Copiato!"; setTimeout(() => { copyBtn.textContent = "📋 Copia risposta"; }, 2000); }); };
        wrap.appendChild(copyBtn);
    }
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
}

function escapeHTML(str) { return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function mostraTyping() {
    const chatEl = document.getElementById("chat");
    const wrap = document.createElement("div");
    wrap.className = "msg-container bot"; wrap.id = "typing";
    wrap.innerHTML = `<div class="msg-row"><div class="avatar avatar-bot">J</div><div class="msg"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
    chatEl.appendChild(wrap); chatEl.scrollTop = chatEl.scrollHeight;
}

function nascondiTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

async function rispondi() {
    const domanda = input.value.trim();
    if (domanda === "") return;
    aggiungiMessaggio(domanda, "user"); input.value = ""; mostraTyping();
    try {
        const res = await fetch(API + "/chat", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: domanda, history: chatHistory, chat_id: currentChatId, access_token: currentToken, is_first_message: isFirstMessage })
        });
        const data = await res.json();
        nascondiTyping(); aggiungiMessaggio(data.response, "bot");
        chatHistory.push({ role: "USER", message: domanda });
        chatHistory.push({ role: "CHATBOT", message: data.response });
        if (isFirstMessage) { isFirstMessage = false; setTimeout(() => caricaChatList(), 1500); }
    } catch { nascondiTyping(); aggiungiMessaggio("Ops, qui c'è qualcosa che non va", "bot"); }
}

input.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); rispondi(); } });
sendBtn.addEventListener("click", rispondi);

// ── AUTO-LOGIN ────────────────────────────────────────────────
const savedToken = localStorage.getItem("jadgpt_token");
const savedUser = localStorage.getItem("jadgpt_user");
const savedEmail = localStorage.getItem("jadgpt_email");
if (savedToken && savedUser) {
    currentToken = savedToken;
    currentUser = savedUser;
    isGuest = false;
    avviaApp(savedEmail);
}
</script>
