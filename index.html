<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>JadGPT</title>
    <link rel="manifest" href="/manifest.json">
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint: #2dba78;
            --lime: #b8f000;
            --lime-soft: #d4f77a;
            --bg: #f5fff8;
            --surface: #ffffff;
            --text: #0f2d1a;
            --text-mid: #1a4a2a;
            --text-muted: #7ab88a;
            --border: #c8f0d8;
            --user-msg: #2dba78;
            --bot-msg: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 100vw;
        }

        /* FORME ASTRATTE */
        .shape {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }
        .shape-circle-1 {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 14px solid var(--lime);
            top: -60px; right: 40px;
            opacity: 0.35;
        }
        .shape-circle-2 {
            width: 90px; height: 90px;
            border-radius: 50%;
            background: var(--lime-soft);
            bottom: 120px; left: -30px;
            opacity: 0.5;
        }
        .shape-rect {
            width: 60px; height: 200px;
            border-radius: 30px;
            background: var(--mint);
            top: 30%; right: -20px;
            opacity: 0.12;
            transform: rotate(15deg);
        }
        .shape-donut {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 22px solid var(--mint);
            bottom: 60px; right: 60px;
            opacity: 0.15;
        }
        .shape-square {
            width: 50px; height: 50px;
            border-radius: 12px;
            background: var(--lime);
            top: 20%; left: 20px;
            opacity: 0.3;
            transform: rotate(22deg);
        }
        .shape-line {
            width: 3px; height: 140px;
            background: var(--mint);
            bottom: 180px; left: 40px;
            opacity: 0.2;
            border-radius: 2px;
        }

        /* TOPBAR */
        #topbar {
            height: 66px;
            background: var(--surface);
            border-bottom: 3px solid var(--lime);
            display: flex; align-items: center; padding: 0 20px; gap: 10px;
            flex-shrink: 0; position: relative; z-index: 10;
        }
        .logo-icon {
            width: 42px; height: 42px;
            background: var(--mint);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 22px; font-weight: 800; color: var(--lime);
            flex-shrink: 0;
            border: 3px solid var(--text);
        }
        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 24px; font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .logo-text span { color: var(--mint); }
        .topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
        .btn-suggest {
            font-family: 'Nunito', sans-serif;
            font-size: 14px; font-weight: 900;
            color: var(--text);
            text-decoration: none;
            border: 3px solid var(--text);
            padding: 7px 16px; border-radius: 12px;
            background: var(--lime); transition: all 0.15s; cursor: pointer;
            white-space: nowrap;
        }
        .btn-suggest:hover { background: var(--mint); color: white; }
        .btn-circle {
            width: 40px; height: 40px; border-radius: 50%;
            border: 3px solid var(--text); background: var(--lime);
            cursor: pointer; display: none; align-items: center; justify-content: center;
            font-size: 17px; transition: all 0.15s; flex-shrink: 0; text-decoration: none;
        }
        .btn-circle:hover { background: var(--mint); }

        @media (max-width: 600px) {
            .btn-suggest { display: none; }
            .btn-circle { display: flex; }
        }
        @media (min-width: 601px) { .btn-circle { display: none; } }

        /* MAIN */
        #main { display: flex; flex: 1; overflow: hidden; max-width: 100vw; position: relative; z-index: 1; }

        /* CHAT AREA */
        #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        #chat {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 24px 20px;
            display: flex; flex-direction: column; gap: 18px;
        }
        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* WELCOME */
        #welcome {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex: 1; padding: 30px 16px; text-align: center; gap: 20px;
        }
        .welcome-badge {
            display: inline-block;
            background: var(--lime);
            border: 3px solid var(--text);
            border-radius: 12px;
            padding: 6px 16px;
            font-family: 'Syne', sans-serif;
            font-size: 13px; font-weight: 800;
            color: var(--text);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .welcome-icon {
            width: 96px; height: 96px;
            background: var(--mint);
            border-radius: 28px;
            border: 4px solid var(--text);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 46px; font-weight: 800; color: var(--lime);
            position: relative;
        }
        .welcome-icon::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 28px;
            border: 4px solid var(--text);
            top: 6px; left: 6px;
            z-index: -1;
            background: var(--lime);
        }
        .welcome-title {
            font-family: 'Syne', sans-serif;
            font-size: 34px; font-weight: 800;
            color: var(--text);
            line-height: 1.1;
            letter-spacing: -1px;
        }
        .welcome-subtitle {
            font-size: 16px; color: var(--text-mid); font-weight: 800;
            background: var(--border); border-radius: 10px; padding: 8px 16px;
        }
        .suggestions {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center; max-width: 520px;
        }
        .suggestion-btn {
            font-family: 'Nunito', sans-serif;
            padding: 10px 16px; border-radius: 12px;
            border: 3px solid var(--text);
            background: var(--surface); color: var(--text);
            font-size: 13px; font-weight: 900;
            cursor: pointer; transition: all 0.15s;
        }
        .suggestion-btn:hover {
            background: var(--lime); transform: translate(-2px, -2px);
            box-shadow: 3px 3px 0 var(--text);
        }

        /* MESSAGGI */
        .msg-container { display: flex; flex-direction: column; gap: 6px; animation: msgIn 0.25s ease; max-width: 100%; }
        @keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .msg-row { display: flex; align-items: flex-end; gap: 10px; }
        .msg {
            padding: 13px 18px; border-radius: 18px;
            max-width: min(70%, calc(100vw - 80px));
            font-size: 15px; line-height: 1.6; word-break: break-word;
            font-weight: 800; border: 3px solid var(--text);
        }
        .user .msg-row { justify-content: flex-end; }
        .user .msg {
            background: var(--user-msg); color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 3px 3px 0 var(--text);
        }
        .bot .msg-row { justify-content: flex-start; }
        .bot .msg {
            background: var(--bot-msg); color: var(--text);
            border-bottom-left-radius: 4px;
            box-shadow: 3px 3px 0 var(--border);
        }
        .bot .msg p { margin: 0 0 8px; }
        .bot .msg p:last-child { margin-bottom: 0; }
        .bot .msg ul, .bot .msg ol { margin: 6px 0; padding-left: 20px; }
        .bot .msg li { margin-bottom: 4px; }
        .bot .msg code { background: var(--lime-soft); color: var(--text); padding: 2px 7px; border-radius: 6px; font-family: monospace; font-size: 13px; border: 2px solid var(--border); }
        .bot .msg pre { background: var(--text); color: var(--lime); padding: 14px; border-radius: 14px; overflow-x: auto; font-size: 13px; margin: 8px 0; border: 3px solid var(--text); }
        .bot .msg pre code { background: transparent; color: inherit; padding: 0; border: none; }

        .avatar {
            width: 34px; height: 34px; border-radius: 11px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800;
            background: var(--mint); color: var(--lime);
            border: 3px solid var(--text);
        }
        .copy-btn {
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 12px;
            font-family: 'Nunito', sans-serif; font-weight: 900;
            padding: 3px 10px; border-radius: 8px;
            align-self: flex-start; transition: all 0.15s; margin-left: 44px;
        }
        .copy-btn:hover { color: var(--mint); background: var(--border); }

        /* TYPING */
        .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
        .typing span {
            display: inline-block; width: 9px; height: 9px;
            background: var(--mint); border-radius: 50%;
            border: 2px solid var(--text);
            animation: bounce 0.6s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.15s; background: var(--lime); }
        .typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

        /* INPUT */
        #input-area {
            padding: 14px 20px;
            background: var(--surface);
            border-top: 3px solid var(--lime);
            display: flex; gap: 10px; align-items: center;
            position: relative; z-index: 10;
        }
        #domanda {
            flex: 1; min-width: 0;
            padding: 13px 18px; border-radius: 16px;
            border: 3px solid var(--text);
            font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 800;
            background: var(--bg); color: var(--text); outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        #domanda:focus { border-color: var(--mint); box-shadow: 3px 3px 0 var(--mint); }
        #domanda::placeholder { color: var(--text-muted); font-weight: 800; }
        #sendBtn {
            width: 50px; height: 50px; border-radius: 16px;
            border: 3px solid var(--text);
            background: var(--mint); color: var(--lime); cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
            font-weight: 900;
        }
        #sendBtn:hover { background: var(--lime); color: var(--text); box-shadow: 3px 3px 0 var(--text); transform: translate(-1px, -1px); }
        #sendBtn:active { transform: translate(1px, 1px); box-shadow: none; }

        /* FOOTER */
        #footer {
            text-align: center; padding: 6px; font-size: 11px;
            color: var(--text-muted); background: var(--surface);
            font-weight: 800; border-top: 1px solid var(--border);
        }
        #footer a { color: var(--text-muted); text-decoration: none; }
        #footer a:hover { color: var(--mint); }
    </style>
</head>
<body>

<!-- Forme astratte -->
<div class="shape shape-circle-1"></div>
<div class="shape shape-circle-2"></div>
<div class="shape shape-rect"></div>
<div class="shape shape-donut"></div>
<div class="shape shape-square"></div>
<div class="shape shape-line"></div>

<div id="topbar">
    <div class="logo-icon">J</div>
    <span class="logo-text">Jad<span>GPT</span></span>
    <div class="topbar-actions">
        <a href="https://forms.gle/5jTRZ7rSTChD8XBB8" target="_blank" class="btn-suggest">💬 Suggerisci</a>
        <a href="https://forms.gle/5jTRZ7rSTChD8XBB8" target="_blank" class="btn-circle" title="Suggerisci">💬</a>
    </div>
</div>

<div id="main">
    <div id="chat-area">
        <div id="chat"></div>
        <div id="input-area">
            <input id="domanda" type="text" placeholder="Scrivimi qualcosa...">
            <button id="sendBtn">➤</button>
        </div>
        <div id="footer">
            <a href="https://jadgpt.onrender.com/legal.html">Privacy Policy</a> ·
            <a href="https://jadgpt.onrender.com/legal.html">Cookie Policy</a> ·
            <a href="https://jadgpt.onrender.com/legal.html">Termini di Utilizzo</a>
        </div>
    </div>
</div>

<script>
const API = "https://jadgpt.onrender.com";
let chatHistory = [];

function mostraWelcome() {
    document.getElementById("chat").innerHTML = `
        <div id="welcome">
            <div class="welcome-badge">✦ AI Chat anonima</div>
            <div class="welcome-icon">J</div>
            <div class="welcome-title">Ciao,<br>sono JadGPT</div>
            <div class="welcome-subtitle">Chiedimi qualsiasi cosa!</div>
            <div class="suggestions">
                <button class="suggestion-btn" onclick="usaSuggerimento(this)">Cos'è l'intelligenza artificiale?</button>
                <button class="suggestion-btn" onclick="usaSuggerimento(this)">Scrivimi una poesia</button>
                <button class="suggestion-btn" onclick="usaSuggerimento(this)">Paesi più grandi del mondo?</button>
                <button class="suggestion-btn" onclick="usaSuggerimento(this)">Dammi una ricetta italiana</button>
            </div>
        </div>`;
}

mostraWelcome();

const input = document.getElementById("domanda");
const sendBtn = document.getElementById("sendBtn");

function usaSuggerimento(btn) {
    input.value = btn.textContent.slice(2).trim();
    rispondi();
}

function aggiungiMessaggio(testo, tipo) {
    const chatEl = document.getElementById("chat");
    const wrap = document.createElement("div");
    wrap.className = "msg-container " + tipo;
    const row = document.createElement("div");
    row.className = "msg-row";
    if (tipo === "bot") {
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "J";
        row.appendChild(avatar);
    }
    const msg = document.createElement("div");
    msg.className = "msg";
    msg.innerHTML = tipo === "user" ? escapeHTML(testo) : marked.parse(testo);
    row.appendChild(msg);
    wrap.appendChild(row);
    if (tipo === "bot") {
        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.textContent = "📋 Copia risposta";
        copyBtn.onclick = () => {
            navigator.clipboard.writeText(testo).then(() => {
                copyBtn.textContent = "✅ Copiato!";
                setTimeout(() => { copyBtn.textContent = "📋 Copia risposta"; }, 2000);
            });
        };
        wrap.appendChild(copyBtn);
    }
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
}

function escapeHTML(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function mostraTyping() {
    const chatEl = document.getElementById("chat");
    const wrap = document.createElement("div");
    wrap.className = "msg-container bot"; wrap.id = "typing";
    wrap.innerHTML = `<div class="msg-row"><div class="avatar">J</div><div class="msg"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
    chatEl.appendChild(wrap);
    chatEl.scrollTop = chatEl.scrollHeight;
}

function nascondiTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

async function rispondi() {
    const domanda = input.value.trim();
    if (domanda === "") return;
    aggiungiMessaggio(domanda, "user");
    input.value = "";
    mostraTyping();
    try {
        const res = await fetch(API + "/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: domanda, history: chatHistory })
        });
        const data = await res.json();
        nascondiTyping();
        aggiungiMessaggio(data.response, "bot");
        chatHistory.push({ role: "USER", message: domanda });
        chatHistory.push({ role: "CHATBOT", message: data.response });
    } catch {
        nascondiTyping();
        aggiungiMessaggio("Ops, qualcosa è andato storto!", "bot");
    }
}

input.addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); rispondi(); }
});
sendBtn.addEventListener("click", rispondi);
</script>
</body>
</html>
